		#####################
		### LOOK AND FEEL ###
		#####################

general {
	gaps_in = 3
	gaps_out = 20

	border_size = 1

	col.active_border = $ActiveBorder
	col.inactive_border = $InactiveBorder

	resize_on_border = true

	allow_tearing = false

	layout = dwindle
}

decoration {
	rounding = 7
	rounding_power = 2

	active_opacity = 1.0
	inactive_opacity = 1.0

	shadow {
		enabled = true
		range = 20
		render_power = 3
		color = $shadow
	}

	blur {
		enabled = true
		size = 3
		passes = 1

		vibrancy = 0.1696
    ignore_opacity = on
    xray = true
	}

}


#dwindle {
#	pseudotile = true
#	preserve_split = true
#}

master {
	new_status = master
}

misc {
	force_default_wallpaper = -1
	disable_hyprland_logo = true
  disable_splash_rendering = true
}

