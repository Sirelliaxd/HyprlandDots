		##############################
		### WINDOWS AND WORKSPACES ###
		##############################

#Ignore maximize requests from all apps
windowrule {
	name = suppress-maximize-events
	match:class = .*

	suppress_event = maximize
}

#Fix dragging issues with XWayland
windowrule {
	name = fix-xwayland-drags
	match:class = ^$
	match:title = ^$
	match:xwayland = true
	match:float = true
	match:fullscreen = false
	match:pin = false

	no_focus = true
}

#Blur waybar background

#layerrule {
# name = blur-waybar
# match:class = waybar
#
# blur = true
#}

#Hyprland-run windowrule
windowrule {
	name = move-hyprland-run
	match:class = hyprland-run

	move = 20 monitor_h-120
	float = yes
}

#Kitty terminal opacity
windowrule {
	name = kitty-opacity
	match:class = kitty

	#	  active, inactive
	opacity = 0.85 0.7
}

windowrule {
  name = zen-opacity
  match:class = zen

  opacity = 0.99999
}

windowrule {
  name = disable-inactive-borders
  match:focus = 0
  border_size = 0
  }


layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications


layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi
layaerule = no_anim on, match:namespace rofi

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
layaerule = no_anim on, match:namespace waybar
