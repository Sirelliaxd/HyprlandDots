		###################
		### KEYBINDINGS ###
		###################

# Windows key as main mod
$mainMod = SUPER 

# close hyprland
bind = $mainMod, M, exec, command -v hyprshutdown>/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# 	----- APPS

#close window
bind = $mainMod, C, killactive,

#reload waybar
bind = $mainMod, W, exec, killall waybar && waybar

# launch app
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, F, exec, $browser
bind = $mainMod, G, exec, qutebrowser

#dwindle
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod SHIFT, J, layoutmsg, togglesplit

#   ----- ROFI
bind = $mainMod, period, exec, ~/.config/rofi/scripts/emoji-selector.sh
bind = $mainMod, X, exec, ~/.config/rofi/scripts/clipboard.sh

# 	----- WINDOWS

#move focus with Mod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

#move focus with Mod + vimKeybinds (hjkl)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

#movewindow with Mod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

#movewindow with Mod + SHIFT + arrow keys
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d



#Move window with Mod + LMB
bindm = $mainMod, mouse:272, movewindow

#resize window with Mod + RMB
bindm = $mainMod, mouse:273, resizewindow



#	----- WORKSPACES

# Switch workspaces with Mod + [0-9]
bind = $mainMod, 1, focusworkspaceoncurrentmonitor, 1
bind = $mainMod, 2, focusworkspaceoncurrentmonitor, 2
bind = $mainMod, 3, focusworkspaceoncurrentmonitor, 3
bind = $mainMod, 4, focusworkspaceoncurrentmonitor, 4
bind = $mainMod, 5, focusworkspaceoncurrentmonitor, 5
bind = $mainMod, 6, focusworkspaceoncurrentmonitor, 6
bind = $mainMod, 7, focusworkspaceoncurrentmonitor, 7
bind = $mainMod, 8, focusworkspaceoncurrentmonitor, 8
bind = $mainMod, 9, focusworkspaceoncurrentmonitor, 9
bind = $mainMod, 0, focusworkspaceoncurrentmonitor, 10

# move active window to workspace with Mod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# scroll thru workspaces with Mod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


#	----- MULTIMEDIA

#laptop multimedia keys for volume
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFUALT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# laptop multimedia keys for brightness
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%-

# change brightness with mod + F5/F6
bind = $mainMod, F5, exec, brightnessctl -e4 -n2 set 5%-
bind = $mainMod, F6, exec, brightnessctl -e4 -n2 set 5%+

#mute and volume with Mod + [F10]F11/F12
bind = $mainMod, F10, exec, wpctl set-mute @DEFUALT_AUDIO_SINK toggle
bind = $mainMod, F11, exec, wpctl set-volume @DEFUALT_AUDIO_SINK 5%+
bind = $mainMod, F12, exec, wpctl set-volume @DEFUALT_AUDIO_SINK 5%+

# requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
